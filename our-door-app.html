<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Our Door | Three's Company</title>
    <link rel="stylesheet" href="our-door.css" />
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const { useMemo, useState } = React;

      const mockLogs = [
        {
          student: "Student A",
          theme: "Understanding async functions",
          area: "JavaScript / API Calls",
          time: "10:42 AM",
          status: "Needs review",
        },
        {
          student: "Student B",
          theme: "Difference between props and state",
          area: "React Fundamentals",
          time: "11:08 AM",
          status: "Resolved",
        },
        {
          student: "Student C",
          theme: "Where to start the project brief",
          area: "Capstone Planning",
          time: "11:27 AM",
          status: "Needs review",
        },
        {
          student: "Student D",
          theme: "Using fetch with JSON data",
          area: "JavaScript / API Calls",
          time: "12:04 PM",
          status: "Watching",
        },
      ];

      function App() {
        const [role, setRole] = useState(null);

        return (
          <main className="app-shell">
            {!role && <LoginScreen onChooseRole={setRole} />}
            {role === "student" && <StudentView onLogout={() => setRole(null)} />}
            {role === "admin" && <AdminView onLogout={() => setRole(null)} />}
          </main>
        );
      }

      function LoginScreen({ onChooseRole }) {
        return (
          <section className="login-screen">
            <div className="brand-panel">
              <p className="team-name">Three's Company</p>
              <h1>Our Door</h1>
              <p className="tagline">
                When students get stuck, they shouldn't have to guess where to go next.
              </p>
              <div className="definition-grid">
                <span>A single entry point into messy curriculum</span>
                <span>A safe place to ask questions</span>
                <span>Three guided knocks before the door opens</span>
                <span>A shared signal back to instructors</span>
              </div>
            </div>

            <div className="role-card">
              <p className="eyebrow">Choose your role</p>
              <h2>Step through the right door.</h2>
              <p>
                This MVP uses two hardcoded paths so we can prove the learning loop and the
                instructor visibility loop quickly.
              </p>
              <div className="role-actions">
                <button onClick={() => onChooseRole("student")}>I'm a Student</button>
                <button className="admin-button" onClick={() => onChooseRole("admin")}>
                  I'm an Admin
                </button>
              </div>
            </div>
          </section>
        );
      }

      function StudentView({ onLogout }) {
        const [question, setQuestion] = useState("");
        const [submittedQuestion, setSubmittedQuestion] = useState(
          "I'm stuck on async functions. How do I know when to use await?"
        );

        function handleSubmit(event) {
          event.preventDefault();
          if (question.trim()) {
            setSubmittedQuestion(question.trim());
            setQuestion("");
          }
        }

        return (
          <section className="workspace">
            <AppHeader
              title="Ask a question from your curriculum"
              subtitle="Three guided knocks: hint, reference, next step."
              onLogout={onLogout}
            />

            <div className="student-layout">
              <div className="chat-panel">
                <div className="message student-message">
                  <span>You</span>
                  {submittedQuestion}
                </div>
                <div className="message assistant-message">
                  <span>Our Door</span>
                  <p>
                    Good question. Start by finding the part of the lesson where a function
                    waits for another task to finish.
                  </p>
                  <ul>
                    <li>What line is returning a promise?</li>
                    <li>What value do you need before the next line can run?</li>
                    <li>Check the curriculum section on API requests and async flow.</li>
                  </ul>
                  <div className="source-chip">Referenced: JavaScript API Calls / Async Flow</div>
                </div>
              </div>

              <aside className="support-card">
                <p className="eyebrow">How this helps</p>
                <h3>Three knocks, then the door opens</h3>
                <p>
                  The assistant starts with a hint, points back to the right curriculum area, and
                  gives a next thinking step so students can reason forward.
                </p>
              </aside>
            </div>

            <form className="question-form" onSubmit={handleSubmit}>
              <input
                value={question}
                onChange={(event) => setQuestion(event.target.value)}
                placeholder="Ask a question from your curriculum..."
              />
              <button type="submit">Submit</button>
            </form>
          </section>
        );
      }

      function AdminView({ onLogout }) {
        const mostCommonTopic = useMemo(() => "JavaScript / API Calls", []);

        return (
          <section className="workspace">
            <AppHeader
              title="Instructor visibility dashboard"
              subtitle="Repeated confusion patterns before students fall behind."
              onLogout={onLogout}
            />

            <div className="summary-grid">
              <SummaryCard label="Most common stuck topic" value={mostCommonTopic} />
              <SummaryCard label="Questions today" value="24" />
              <SummaryCard label="Needs instructor attention" value="7" />
            </div>

            <div className="admin-panel">
              <div className="panel-heading">
                <div>
                  <p className="eyebrow">Logged stuck points</p>
                  <h2>Where students need support</h2>
                </div>
                <span className="privacy-note">Mock data for MVP</span>
              </div>

              <table>
                <thead>
                  <tr>
                    <th>Student</th>
                    <th>Question Theme</th>
                    <th>Curriculum Area</th>
                    <th>Time</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {mockLogs.map((log) => (
                    <tr key={`${log.student}-${log.time}`}>
                      <td>{log.student}</td>
                      <td>{log.theme}</td>
                      <td>{log.area}</td>
                      <td>{log.time}</td>
                      <td>
                        <span className={`status ${log.status.toLowerCase().replaceAll(" ", "-")}`}>
                          {log.status}
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </section>
        );
      }

      function AppHeader({ title, subtitle, onLogout }) {
        return (
          <header className="app-header">
            <div>
              <p className="team-name">Our Door</p>
              <h1>{title}</h1>
              <p>{subtitle}</p>
            </div>
            <button className="ghost-button" onClick={onLogout}>
              Back to roles
            </button>
          </header>
        );
      }

      function SummaryCard({ label, value }) {
        return (
          <div className="summary-card">
            <span>{label}</span>
            <strong>{value}</strong>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
